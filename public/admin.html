<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JetPhotos Admin Panel</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      margin: 0;
      padding: 20px;
    }
    h1 { color: #58a6ff; }
    #login {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    input, button {
      padding: 8px 12px;
      border-radius: 6px;
      border: none;
      font-size: 15px;
    }
    button {
      cursor: pointer;
      background: #238636;
      color: white;
    }
    button.reject { background: #da3633; }
    button.delete { background: #8B0000; }
    #photos {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 20px;
    }
    .photo-card {
      background: #161b22;
      border-radius: 10px;
      overflow: hidden;
      width: 220px;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
    }
    .photo-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }
    .photo-card .info {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .discord-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(88,101,242,0.18);
      color: #8891f5;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-top: 2px;
    }
    .actions {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      gap: 6px;
      flex-wrap: wrap;
    }
    .actions button {
      flex: 1;
      min-width: 0;
      font-size: 13px;
      padding: 7px 6px;
    }

    /* ── Reject Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .modal-box {
      background: #161b22;
      border-radius: 12px;
      padding: 28px 28px 22px;
      width: 420px;
      max-width: 95vw;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .modal-box h3 { margin: 0; color: #f85149; font-size: 1.1rem; }
    .modal-box p  { margin: 0; color: #8b949e; font-size: 0.88rem; }
    .modal-box textarea {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-family: inherit;
      font-size: 14px;
      padding: 10px;
      resize: vertical;
      min-height: 80px;
      width: 100%;
      box-sizing: border-box;
    }
    .modal-box textarea:focus {
      outline: none;
      border-color: #f85149;
      box-shadow: 0 0 0 2px rgba(248,81,73,0.2);
    }
    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .modal-actions .btn-cancel {
      background: transparent;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 8px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .modal-actions .btn-cancel:hover { border-color: #8b949e; color: #e6edf3; }
    .modal-actions .btn-confirm {
      background: #da3633;
      border: none;
      color: white;
      padding: 8px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    .modal-actions .btn-confirm:hover { background: #b91c1a; }
  </style>
</head>
<body>
  <h1>JetPhotos Review Panel</h1>
  <div id="login">
    <p>Please enter admin password:</p>
    <input id="pass" type="password" placeholder="Admin password">
    <button onclick="login()">Login</button>
  </div>

  <div id="panel" style="display:none;">
    <h2>Pending Photos</h2>
    <div id="photos"></div>
  </div>

  <!-- Reject Reason Modal -->
  <div id="rejectModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <h3>✗ Reject Photo</h3>
      <p>Optionally provide a reason. It will be sent to the uploader via Discord DM (if they're logged in).</p>
      <textarea id="rejectReason" placeholder="e.g., Low image quality, watermark detected, off-topic content…"></textarea>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeRejectModal()">Cancel</button>
        <button class="btn-confirm" onclick="confirmReject()">Reject</button>
      </div>
    </div>
  </div>

  <script>
    let adminPass = '';
    let rejectTargetId = null;

    async function login() {
      adminPass = document.getElementById('pass').value.trim();
      if (!adminPass) return alert('Please enter password');
      document.getElementById('login').style.display = 'none';
      document.getElementById('panel').style.display = 'block';
      loadPending();
    }

    async function loadPending() {
      const res = await fetch('/admin/photos/pending', {
        headers: { 'x-admin-pass': adminPass }
      });
      if (!res.ok) {
        alert('Incorrect password or server error');
        location.reload();
        return;
      }
      const photos = await res.json();
      const box = document.getElementById('photos');
      box.innerHTML = '';
      if (photos.length === 0) {
        box.innerHTML = '<p>No pending photos at the moment 🎉</p>';
        return;
      }
      photos.forEach(p => {
        const div = document.createElement('div');
        div.className = 'photo-card';
        div.innerHTML = `
          <img src="${p.thumb}" alt="" onclick="window.open('${p.file}', '_blank')" title="Click to view full image" style="cursor:pointer;">
          <div class="info">
            <strong>${p.caption || '(No description)'}</strong>
            <small>by ${p.photographer || 'Anonymous'}</small>
            ${p.discordId
              ? `<span class="discord-badge">
                  <svg width="11" height="11" viewBox="0 0 71 55" fill="currentColor"><path d="M60.1 4.9A58.6 58.6 0 0 0 45.5.6a40.6 40.6 0 0 0-1.8 3.7 54.2 54.2 0 0 0-16.3 0A39 39 0 0 0 25.6.6 58.5 58.5 0 0 0 11 4.9C1.6 19 -.9 32.7.3 46.2a59 59 0 0 0 18 9.1 44.6 44.6 0 0 0 3.9-6.3 38.4 38.4 0 0 1-6.1-2.9l1.5-1.1a42.2 42.2 0 0 0 36 0l1.5 1.1a38.3 38.3 0 0 1-6.1 3 44.5 44.5 0 0 0 3.9 6.2 58.8 58.8 0 0 0 18-9C72.9 30.4 69 16.8 60.1 4.9ZM23.8 37.9c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2c3.5 0 6.4 3.2 6.3 7.2 0 4-2.8 7.2-6.3 7.2Zm23.4 0c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2c3.5 0 6.4 3.2 6.3 7.2 0 4-2.8 7.2-6.3 7.2Z"/></svg>
                  Will notify via DM
                 </span>`
              : '<span style="color:#8b949e;font-size:11px;">No Discord linked</span>'
            }
            ${p.tags && p.tags.length > 0 ? `
              <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;">
                ${p.tags.map(tag => `<span style="background:rgba(88,166,255,0.15);color:#58a6ff;padding:2px 8px;border-radius:10px;font-size:11px;">${tag}</span>`).join('')}
              </div>
            ` : ''}
          </div>
          <div class="actions">
            <button onclick="approve('${p._id}')">✓ Approve</button>
            <button class="reject" onclick="openRejectModal('${p._id}')">✗ Reject</button>
            <button class="delete" onclick="deletePhoto('${p._id}')">🗑</button>
          </div>
        `;
        box.appendChild(div);
      });
    }

    async function approve(id) {
      await fetch(`/admin/photos/${id}/approve`, {
        method: 'POST',
        headers: { 'x-admin-pass': adminPass }
      });
      loadPending();
    }

    function openRejectModal(id) {
      rejectTargetId = id;
      document.getElementById('rejectReason').value = '';
      document.getElementById('rejectModal').style.display = 'flex';
      setTimeout(() => document.getElementById('rejectReason').focus(), 50);
    }

    function closeRejectModal() {
      rejectTargetId = null;
      document.getElementById('rejectModal').style.display = 'none';
    }

    async function confirmReject() {
      if (!rejectTargetId) return;
      const reason = document.getElementById('rejectReason').value.trim();
      await fetch(`/admin/photos/${rejectTargetId}/reject`, {
        method: 'POST',
        headers: {
          'x-admin-pass': adminPass,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ reason })
      });
      closeRejectModal();
      loadPending();
    }

    async function deletePhoto(id) {
      if (!confirm('Permanently delete this photo?')) return;
      await fetch(`/admin/photos/${id}`, {
        method: 'DELETE',
        headers: { 'x-admin-pass': adminPass }
      });
      loadPending();
    }

    // Close modal on overlay click
    document.getElementById('rejectModal').addEventListener('click', function(e) {
      if (e.target === this) closeRejectModal();
    });

    // Enter key in reject textarea → confirm
    document.getElementById('rejectReason').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) confirmReject();
    });
  </script>
</body>
</html>
