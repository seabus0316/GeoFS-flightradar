1) 詞彙表（上面這區最常看）

基本動作

詞彙	意思
cleared to	核准飛往 / 放行至
as filed	按原飛行計畫
taxi	滑行
hold short	在前面停住，不要跨越
hold position	原地停住
line up and wait	進跑道對正等待
cleared for takeoff	准許起飛
cleared to land	准許落地
go around	重飛
vacate runway	離開跑道
cross runway	穿越跑道

高度 / 航向 / 航路

詞彙	意思
initial climb	初始爬升高度
climb and maintain	爬升並維持
descend and maintain	下降並維持
expect FLxxx	預期之後可爬/降到某飛行高度層
heading	航向
direct [waypoint]	直飛某航點
departure	離場程序 / 離場管制
approach	進場管制 / 進場程序
ILS approach	儀器降落進場
visual approach	目視進場
final	最後進場階段
通訊 / 雷達
詞彙	意思
contact	切到某頻率聯絡
departure frequency	離場頻率
ground	地面
tower	塔台
squawk	設定應答機代碼
QNH / altimeter	氣壓設定


排序 / 其他

詞彙	意思
number 1 / number 2	進場或起飛排序
traffic	其他飛機
stand by	稍等
say again	請重複
affirm	是
negative	否
unable	無法執行
wilco	收到，會照做
roger	收到訊息